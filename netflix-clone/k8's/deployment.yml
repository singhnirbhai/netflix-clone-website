apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: netflix-app

  template:
    metadata:
      labels:
        app: netflix-app

    spec:
      containers:
      - name: netflix-app
        image: dockerhubusername/netflix-app:latest

        ports:
        - containerPort: 5173
        env:
        - name: TMDB_KEY
          valueFrom:
            secretKeyRef:
              name: tmdb-secret
              key: TMDB_KEY
